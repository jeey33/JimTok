<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JimTok - Dust Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background-color: #1e293b;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }

        h1 { color: #38bdf8; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 0.95rem; line-height: 1.5; }

        .btn-connect {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn-connect:hover { background-color: #0ea5e9; transform: scale(1.02); }

        .dust-section {
            margin-top: 25px;
            text-align: left;
            display: none;
        }

        h3 { color: #94a3b8; font-size: 1rem; border-bottom: 1px solid #334155; padding-bottom: 8px; }

        .token-list {
            max-height: 250px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .token-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #0f172a;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #1e293b;
        }

        .token-info { display: flex; flex-direction: column; }
        .token-name { font-weight: bold; color: #f1f5f9; }
        .token-symbol { font-size: 0.8rem; color: #64748b; }
        .token-balance { font-family: monospace; color: #34d399; font-weight: bold; }
        
        .loading { text-align: center; color: #38bdf8; font-style: italic; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>JimTok</h1>
        <p>Aspirateur de Crypto Dust. Connectez votre wallet pour scanner vos balances oubliées.</p>
        
        <button id="connectButton" class="btn-connect">Connecter mon Wallet</button>
        <div id="loadingText" class="loading">Scan du wallet en cours (aspiration de la poussière)...</div>
        
        <div id="dustSection" class="dust-section">
            <h3>Poussières détectées :</h3>
            <div id="tokenList" class="token-list">
                </div>
        </div>
    </div>

    <script>
        // Configurer ta clé API ici :
        const MORALIS_API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJub25jZSI6Ijk1YjcyOTliLTYwMTQtNDNlOC05MDNmLWYwNWJkZjVmMWQxYyIsIm9yZ0lkIjoiNTE2OTI5IiwidXNlcklkIjoiNTMxOTg2IiwidHlwZUlkIjoiZTg3Njg4YjctYmQ3NS00OTI5LTg0NjctMDRlNGZmNWRkZTUzIiwidHlwZSI6IlBST0pFQ1QiLCJpYXQiOjE3NzkzNTIwNzgsImV4cCI6NDkzNTExMjA3OH0.G6s_KeUqXR8y2xH4wvK9E__fHr7-WHjgT05wapVPb2o";

const connectButton = document.getElementById('connectButton');
const dustSection = document.getElementById('dustSection');
const tokenList = document.getElementById('tokenList');
const loadingText = document.getElementById('loadingText');

connectButton.addEventListener('click', async () => {
    if (typeof window.ethereum !== 'undefined') {
        try {
            // 1. Connexion au Wallet
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const walletAddress = await signer.getAddress();
            
            connectButton.innerText = "Wallet Connecté 🎉";
            connectButton.style.backgroundColor = "#34d399";
            connectButton.disabled = true;
            loadingText.style.display = "block";
            tokenList.innerHTML = ""; // On vide la liste

            // 2. Liste des réseaux
            const networks = [
                { id: "eth", name: "Ethereum", nativeSymbol: "ETH" },
                { id: "polygon", name: "Polygon", nativeSymbol: "POL" },
                { id: "bsc", name: "Binance Smart Chain", nativeSymbol: "BNB" },
                { id: "base", name: "Base", nativeSymbol: "ETH" },
                { id: "arbitrum", name: "Arbitrum", nativeSymbol: "ETH" },
                { id: "optimism", name: "Optimism", nativeSymbol: "ETH" }
            ];

            let totalTokensFound = 0;
            let walletTotalValueUSD = 0; // Cumul précis pour le total global

            // Fonction utilitaire pour ajouter une ligne dans l'interface avec le prix précis
            function addTokenToUI(name, symbol, networkName, balance, usdValue) {
                totalTokensFound++;
                const tokenItem = document.createElement('div');
                tokenItem.className = 'token-item';
                
                // CORRECTION ICI : On utilise .toFixed(4) au lieu de (2) pour voir les fractions de centimes !
                // Si la valeur est vraiment minuscule mais supérieure à 0, on affiche 4 décimales.
                const displayValue = usdValue > 0 ? `$${usdValue.toFixed(4)}` : "$0.0000";

                tokenItem.innerHTML = `
                    <div class="token-info">
                        <span class="token-name">${name}</span>
                        <span class="token-symbol">${symbol} <small style="color:#64748b; font-size:11px;">(${networkName})</small></span>
                    </div>
                    <div style="text-align: right; display: flex; flex-direction: column;">
                        <span class="token-balance">${balance}</span>
                        <span style="color: #94a3b8; font-size: 0.85rem; font-family: monospace;">${displayValue}</span>
                    </div>
                `;
                tokenList.appendChild(tokenItem);
            }

            // 3. Boucle principale sur tous les réseaux
            for (const network of networks) {
                try {
                    // --- PARTIE A : MONNAIE NATIVE ---
                    const nativeUrl = `https://deep-index.moralis.io/api/v2.2/${walletAddress}/balance?chain=${network.id}&include=percent_change`;
                    const nativeResponse = await fetch(nativeUrl, {
                        method: "GET",
                        headers: { "accept": "application/json", "x-api-key": MORALIS_API_KEY }
                    });

                    if (nativeResponse.ok) {
                        const nativeData = await nativeResponse.json();
                        const nativeBalance = BigInt(nativeData.balance);
                        const formattedNative = ethers.formatUnits(nativeBalance, 18);
                        
                        // On garde 6 décimales pour le solde crypto pour ne rien rater
                        const roundedNative = parseFloat(formattedNative).toFixed(6);

                        if (parseFloat(formattedNative) > 0) {
                            const nativePriceUSD = nativeData.usd_price || 0;
                            const totalRowValueUSD = parseFloat(formattedNative) * nativePriceUSD;
                            walletTotalValueUSD += totalRowValueUSD; // Ajout mathématique ultra-précis

                            addTokenToUI(network.name + " Native", network.nativeSymbol, network.name, roundedNative, totalRowValueUSD);
                        }
                    }

                    // --- PARTIE B : JETONS (ERC-20) ---
                    const erc20Url = `https://deep-index.moralis.io/api/v2.2/${walletAddress}/erc20?chain=${network.id}&include=percent_change`;
                    const erc20Response = await fetch(erc20Url, {
                        method: "GET",
                        headers: { "accept": "application/json", "x-api-key": MORALIS_API_KEY }
                    });

                    if (erc20Response.ok) {
                        const tokens = await erc20Response.json();
                        
                        tokens.forEach(token => {
                            const rawBalance = BigInt(token.balance);
                            const decimals = token.decimals;
                            const formattedBalance = ethers.formatUnits(rawBalance, decimals);
                            const roundedBalance = parseFloat(formattedBalance).toFixed(6);

                            if (parseFloat(formattedBalance) > 0) {
                                const tokenPriceUSD = token.usd_price || 0;
                                const totalRowValueUSD = parseFloat(formattedBalance) * tokenPriceUSD;
                                walletTotalValueUSD += totalRowValueUSD; // Ajout mathématique ultra-précis

                                addTokenToUI(token.name, token.symbol, network.name, roundedBalance, totalRowValueUSD);
                            }
                        });
                    }

                } catch (netError) {
                    console.error(`Erreur sur le réseau ${network.name}:`, netError);
                }
            }

            // 4. Fin de l'aspiration globale
            loadingText.style.display = "none";
            dustSection.style.display = "block";

            if (totalTokensFound === 0) {
                tokenList.innerHTML = "<p style='text-align:center; color:#94a3b8;'>L'aspirateur est passé... aucune poussière trouvée.</p>";
            } else {
                // On affiche le grand total en haut. Comme on a additionné les valeurs brutes sans les arrondir avant,
                // le résultat final affichera enfin tes précieux dollars cumulés (ex: $4.12)
                const totalDiv = document.createElement('div');
                totalDiv.style.cssText = "text-align:center; margin-bottom:15px; padding:10px; background:#0ea5e922; border-radius:8px; border:1px dashed #0ea5e9; font-weight:bold; color:#38bdf8; font-size:1.1rem;";
                totalDiv.innerHTML = `Valeur totale de votre poussière : $${walletTotalValueUSD.toFixed(2)}`;
                tokenList.insertBefore(totalDiv, tokenList.firstChild);
            }

        } catch (error) {
            console.error("Erreur générale :", error);
            loadingText.style.display = "none";
            alert("Une erreur est survenue lors de l'aspiration totale.");
        }
    } else {
        alert("Veuillez installer ou utiliser MetaMask !");
    }
});
    </script>
</body>
</html>
