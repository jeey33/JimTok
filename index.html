<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JimTok - Transform your Crypto Dust</title>
    <style>
        /* Un petit style rapide pour que ce soit propre et lisible */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background-color: #1e293b;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .btn-connect {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
        }

        .btn-connect:hover {
            background-color: #0ea5e9;
            transform: scale(1.02);
        }

        #walletAddress {
            margin-top: 15px;
            font-family: monospace;
            background-color: #0f172a;
            padding: 8px;
            border-radius: 6px;
            color: #34d399;
            display: none; /* Caché par défaut, affiché une fois connecté */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>JimTok</h1>
        <p>Transformez votre poussière de crypto oubliée en un seul token communautaire simple.</p>
        
        <button id="connectButton" class="btn-connect">Connecter mon Wallet</button>
        
        <div id="walletAddress"></div>
    </div>

    <script>
        const connectButton = document.getElementById('connectButton');
        const walletAddressDisplay = document.getElementById('walletAddress');

        connectButton.addEventListener('click', async () => {
            // 1. Vérifier si un wallet (comme MetaMask) est installé dans le navigateur
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // 2. Demander au wallet l'autorisation de se connecter
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // 3. Récupérer l'adresse publique du premier compte connecté
                    const walletAddress = accounts[0];
                    
                    // 4. Raccourcir l'adresse pour l'affichage (ex: 0x1234...abcd)
                    const shortAddress = walletAddress.substring(0, 6) + '...' + walletAddress.substring(walletAddress.length - 4);
                    
                    // 5. Mettre à jour l'interface graphique
                    walletAddressDisplay.innerText = `Connecté : ${shortAddress}`;
                    walletAddressDisplay.style.display = 'block'; // Afficher le bloc d'adresse
                    connectButton.innerText = "Wallet Connecté 🎉";
                    connectButton.style.backgroundColor = "#34d399"; // Change le bouton en vert
                    
                } catch (error) {
                    console.error("L'utilisateur a refusé la connexion", error);
                    alert("Connexion refusée par l'utilisateur.");
                }
            } else {
                // Si aucune extension de wallet n'est détectée
                alert("Aucun wallet compatible détecté. Veuillez installer MetaMask ou une extension similaire !");
                window.open('https://metamask.io/download/', '_blank');
            }
        });
    </script>

</body>
</html>
