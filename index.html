<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JimTok - Transform your Crypto Dust</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background-color: #1e293b;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .btn-connect {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
            width: 100%;
        }

        .btn-connect:hover {
            background-color: #0ea5e9;
            transform: scale(1.02);
        }

        .info-box {
            margin-top: 20px;
            background-color: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            display: none; /* Caché au début */
            text-align: left;
        }

        .info-line {
            margin: 8px 0;
            font-size: 0.9rem;
        }

        .label {
            color: #64748b;
            font-weight: bold;
        }

        .value {
            font-family: monospace;
            color: #34d399;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>JimTok</h1>
        <p>Transformez votre poussière de crypto oubliée en un seul token communautaire simple.</p>
        
        <button id="connectButton" class="btn-connect">Connecter mon Wallet</button>
        
        <div id="infoBox" class="info-box">
            <div class="info-line">
                <span class="label">Adresse :</span>
                <span id="walletAddress" class="value">-</span>
            </div>
            <div class="info-line">
                <span class="label">Solde principal :</span>
                <span id="walletBalance" class="value">-</span>
            </div>
        </div>
    </div>

    <script>
        const connectButton = document.getElementById('connectButton');
        const infoBox = document.getElementById('infoBox');
        const walletAddressDisplay = document.getElementById('walletAddress');
        const walletBalanceDisplay = document.getElementById('walletBalance');

        connectButton.addEventListener('click', async () => {
            // 1. Vérifier si MetaMask (window.ethereum) est présent
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // 2. Initialiser Ethers.js avec le wallet du navigateur
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    
                    // 3. Demander la connexion au wallet
                    const signer = await provider.getSigner();
                    const address = await signer.getAddress();
                    
                    // 4. Récupérer le solde de la monnaie native (ETH, MATIC etc. selon le réseau)
                    const balanceBigInt = await provider.getBalance(address);
                    // On convertit le solde (qui est en Wei) en format lisible (ex: 0.015 ETH)
                    const balanceFormatted = ethers.formatEther(balanceBigInt);
                    // On garde 4 chiffres après la virgule pour faire propre
                    const balanceFixed = parseFloat(balanceFormatted).toFixed(4);

                    // 5. Récupérer le nom de la monnaie selon le réseau connecté
                    const network = await provider.getNetwork();
                    let cryptoName = "ETH"; // Par défaut
                    if (network.chainId === 137n) cryptoName = "MATIC";
                    if (network.chainId === 56n) cryptoName = "BNB";

                    // 6. Mettre à jour l'affichage
                    const shortAddress = address.substring(0, 6) + '...' + address.substring(address.length - 4);
                    walletAddressDisplay.innerText = shortAddress;
                    walletBalanceDisplay.innerText = `${balanceFixed} ${cryptoName}`;
                    
                    // Afficher la boîte d'infos et changer le bouton
                    infoBox.style.display = 'block';
                    connectButton.innerText = "Wallet Connecté 🎉";
                    connectButton.style.backgroundColor = "#34d399";
                    connectButton.disabled = true; // Désactive le bouton puisqu'on est connecté

                } catch (error) {
                    console.error("Erreur lors de la connexion :", error);
                    alert("La connexion a échoué ou a été refusée.");
                }
            } else {
                alert("Aucun wallet compatible détecté. Veuillez utiliser l'application MetaMask !");
                window.open('https://metamask.io/download/', '_blank');
            }
        });
    </script>

</body>
</html>
